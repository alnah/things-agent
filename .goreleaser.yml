version: 2

project_name: things-agent

before:
  hooks:
    - go mod tidy

builds:
  - id: things-agent
    main: .
    binary: things-agent
    ldflags:
      - -s -w -X main.cliVersion={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^style:"
  groups:
    - title: Features
      regexp: "^feat(\\(.+\\))?:"
      order: 0
    - title: Fixes
      regexp: "^fix(\\(.+\\))?:"
      order: 1
    - title: CI and Build
      regexp: "^(ci|build)(\\(.+\\))?:"
      order: 2
    - title: Refactors
      regexp: "^refactor(\\(.+\\))?:"
      order: 3
    - title: Others
      order: 999

release:
  footer: |
    ---
    **Full Changelog**: https://github.com/alnah/things-agent/compare/{{ .PreviousTag }}...{{ .Tag }}
